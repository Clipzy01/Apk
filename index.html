<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>7000</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b84ff">
<meta name="description" content="Mesagerie simulata cu numarul 7000">

<!-- Makes this installable as a full-screen app icon on iPhone (Add to Home Screen) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="7000">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    background: #f2f2f2;
  }

  .phone {
    max-width: 430px;
    margin: 0 auto;
    height: 100vh;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px 6px 24px;
    font-size: 15px;
    font-weight: 600;
    color: #000;
    background: #f9f9f9;
  }
  .status-bar .dots {
    display: flex;
    gap: 3px;
    align-items: center;
  }
  .status-bar .dots span {
    width: 5px; height: 5px; border-radius: 50%;
    background: #000; display: inline-block;
  }
  .status-icons { display: flex; align-items: center; gap: 5px; }
  .status-icons svg { display: block; }

  /* Header */
  .chat-header {
    background: #f9f9f9;
    padding: 6px 12px 10px 12px;
    display: flex;
    align-items: center;
    border-bottom: 1px solid #d9d9d9;
  }
  .back-btn {
    color: #007aff;
    font-size: 30px;
    padding: 0 8px 0 0;
    line-height: 1;
    cursor: default;
    user-select: none;
  }
  .header-center {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 2px;
  }
  .avatar-circle {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: #1c1c1e;
    margin-bottom: 2px;
  }
  .contact-name {
    font-size: 13px;
    color: #000;
    font-weight: 400;
  }
  .header-icons {
    display: flex;
    gap: 14px;
    align-items: center;
    padding-bottom: 22px;
  }
  .header-icons svg { display: block; }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px 12px 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    background: #ffffff;
  }
  .bubble-row {
    display: flex;
    width: 100%;
  }
  .bubble-row.sent { justify-content: flex-end; }
  .bubble-row.received { justify-content: flex-start; }

  .bubble {
    max-width: 78%;
    padding: 9px 14px;
    border-radius: 20px;
    font-size: 16.5px;
    line-height: 1.28;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .bubble.sent {
    background: #0b84ff;
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .bubble.received {
    background: #e9e9eb;
    color: #000;
    border-bottom-left-radius: 4px;
  }

  .typing-row { display: flex; justify-content: flex-start; }
  .typing-bubble {
    background: #e9e9eb;
    border-radius: 20px;
    border-bottom-left-radius: 4px;
    padding: 10px 16px;
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .typing-bubble span {
    width: 7px; height: 7px; border-radius: 50%;
    background: #9b9b9b;
    display: inline-block;
    animation: blink 1.2s infinite ease-in-out;
  }
  .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.85); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* Input bar */
  .input-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-top: 1px solid #d9d9d9;
    background: #f9f9f9;
  }
  .plus-btn {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 1.5px solid #c7c7cc;
    color: #8e8e93;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: #fff;
  }
  .text-input-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    background: #fff;
    border: 1px solid #c7c7cc;
    border-radius: 18px;
    padding: 6px 12px;
  }
  .text-input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 16px;
    background: transparent;
    font-family: inherit;
  }
  .send-btn {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: #0b84ff;
    border: none;
    color: #fff;
    display: none;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    cursor: pointer;
  }
  .send-btn.visible { display: flex; }
  .send-btn:disabled { opacity: 0.4; }

  .messages::-webkit-scrollbar { width: 0; }

  /* When installed to the home screen (standalone app), hide the fake status
     bar since iOS shows its own real one, and respect the safe areas. */
  @media (display-mode: standalone) {
    .status-bar { display: none; }
    .phone { padding-top: env(safe-area-inset-top); }
    .input-bar { padding-bottom: calc(8px + env(safe-area-inset-bottom)); }
  }
</style>
</head>
<body>

<div class="phone">

  <!-- Status bar -->
  <div class="status-bar">
    <span id="clock">9:41</span>
    <div class="status-icons">
      <!-- signal dots -->
      <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="7" width="3" height="5" rx="0.8" fill="#000"/><rect x="4.5" y="5" width="3" height="7" rx="0.8" fill="#000"/><rect x="9" y="3" width="3" height="9" rx="0.8" fill="#000"/><rect x="13.5" y="0" width="3" height="12" rx="0.8" fill="#000"/></svg>
      <!-- wifi -->
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 10.2C8.66 10.2 9.2 10.74 9.2 11.4C9.2 12.06 8.66 12.6 8 12.6C7.34 12.6 6.8 12.06 6.8 11.4C6.8 10.74 7.34 10.2 8 10.2Z" fill="#000"/><path d="M4.6 7.6C5.6 6.6 6.76 6.1 8 6.1C9.24 6.1 10.4 6.6 11.4 7.6L10.3 8.7C9.6 8 8.83 7.65 8 7.65C7.17 7.65 6.4 8 5.7 8.7L4.6 7.6Z" fill="#000"/><path d="M2 5C3.9 3.1 5.9 2.2 8 2.2C10.1 2.2 12.1 3.1 14 5L12.9 6.1C11.35 4.6 9.7 3.85 8 3.85C6.3 3.85 4.65 4.6 3.1 6.1L2 5Z" fill="#000"/></svg>
      <!-- battery -->
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="2.5" stroke="#000" opacity="0.35"/><rect x="2" y="2" width="8" height="8" rx="1.5" fill="#000"/><rect x="22.5" y="4" width="1.5" height="4" rx="0.8" fill="#000" opacity="0.35"/></svg>
    </div>
  </div>

  <!-- Header -->
  <div class="chat-header">
    <div class="back-btn">&#8249;</div>
    <div class="header-center">
      <div class="avatar-circle"></div>
      <div class="contact-name">7000</div>
    </div>
    <div style="width:26px"></div>
  </div>
  <div style="display:flex; justify-content:flex-end; gap:16px; padding:8px 16px; border-bottom:1px solid #d9d9d9; background:#f9f9f9;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.362 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0122 16.92z" stroke="#007aff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9.5" stroke="#007aff" stroke-width="1.8"/><path d="M12 16v-5" stroke="#007aff" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="8.2" r="1" fill="#007aff"/></svg>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Input bar -->
  <div class="input-bar">
    <div class="plus-btn">+</div>
    <div class="text-input-wrap">
      <input class="text-input" id="textInput" type="text" inputmode="numeric" placeholder="iMessage" autocomplete="off" />
    </div>
    <button class="send-btn" id="sendBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 19V5M12 5L5 12M12 5l7 7" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

</div>

<script>
  const messagesEl = document.getElementById('messages');
  const input = document.getElementById('textInput');
  const sendBtn = document.getElementById('sendBtn');
  const clockEl = document.getElementById('clock');

  function updateClock() {
    const now = new Date();
    let h = now.getHours();
    const m = now.getMinutes();
    clockEl.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  }
  updateClock();
  setInterval(updateClock, 1000 * 15);

  function pad(n) { return String(n).padStart(2, '0'); }

  function formatDate(d) {
    return `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()}`;
  }
  function formatTime(d) {
    return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function randomDigits(count) {
    let s = '';
    // first digit non-zero
    s += String(Math.floor(Math.random() * 9) + 1);
    for (let i = 1; i < count; i++) {
      s += String(Math.floor(Math.random() * 10));
    }
    return s;
  }

  function addBubble(text, sent) {
    const row = document.createElement('div');
    row.className = 'bubble-row ' + (sent ? 'sent' : 'received');
    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + (sent ? 'sent' : 'received');
    bubble.textContent = text;
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return row;
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'bubble-row received typing-row';
    row.id = 'typingRow';
    const bubble = document.createElement('div');
    bubble.className = 'typing-bubble';
    bubble.innerHTML = '<span></span><span></span><span></span>';
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideTyping() {
    const row = document.getElementById('typingRow');
    if (row) row.remove();
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  async function handleSend() {
    const raw = input.value.trim();
    if (!raw) return;
    addBubble(raw, true);
    input.value = '';
    sendBtn.classList.remove('visible');

    const boardNumber = raw;
    const digitCount = 8; // matches "21059915" from the example
    const ticketNumber = randomDigits(digitCount);

    const now = new Date();
    const later = new Date(now.getTime() + 60 * 60 * 1000);

    // First reply
    await sleep(700);
    showTyping();
    await sleep(1100);
    hideTyping();
    addBubble('Solicitarea este in curs de procesare.', false);

    // Second reply
    await sleep(600);
    showTyping();
    await sleep(1300);
    hideTyping();

    const ticketText =
`Bilet electronic nr.
${ticketNumber}
${formatDate(now)}
Valabil 1 ora (de la ${formatTime(now)} pina la ${formatTime(later)})
Pret 7 MDL
Numar de bord ${boardNumber}`;

    addBubble(ticketText, false);
  }

  input.addEventListener('input', () => {
    if (input.value.trim().length > 0) {
      sendBtn.classList.add('visible');
    } else {
      sendBtn.classList.remove('visible');
    }
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      handleSend();
    }
  });

  sendBtn.addEventListener('click', handleSend);

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }

</script>

</body>
</html>
